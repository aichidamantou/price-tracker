# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【版本记录】                                                                 │
# │  v1 2026-06-21  初始 单容器+JSON+37列                                      │
# │  v2 2026-06-21  日期归一化/品牌识别修复/上传按钮简化/8列/涨跌色/模板下载     │
# │  v3 2026-06-21  两阶段上传(预览→核对→确认)/PriceReviewModal(偏差≥20元)     │
# │                  模板日期改今天/yml架构文档完善                              │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ════════════════════════════════════════════════════════════════════════════════

services:
  app:
    build: .
    ports:
      - "8889:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - TZ=Asia/Shanghai
    shm_size: 256mb
    mem_limit: 512m
    restart: unless-stopped
