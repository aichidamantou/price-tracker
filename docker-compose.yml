# ════════════════════════════════════════════════════════════════════════════════
# 📊  价格追踪看板  (Price Tracker Dashboard)
# ════════════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【架构总览】单容器，FastAPI 后端 + React 前端（预构建静态文件）             │
# │                                                                             │
# │   ┌────────────────────────────────────────────────┐                       │
# │   │  容器: price-tracker-app                   8000│                       │
# │   │  ├─ POST /api/upload          一键上传(无核对)  │                       │
# │   │  ├─ POST /api/upload/preview   Phase1:解析+检测  │                       │
# │   │  ├─ POST /api/upload/confirm   Phase2:确认+保存  │                       │
# │   │  ├─ GET  /api/dashboard        全量聚合数据      │                       │
# │   │  ├─ GET  /api/item/{name}      单商品历史序列    │                       │
# │   │  ├─ GET  /api/template         下载今日价格模板  │                       │
# │   │  └─ GET  /                     前端 SPA 入口     │                       │
# │   ├─ 静态文件 (frontend/dist → /app/static)          │                       │
# │   └─ 数据持久化 (/data/prices.json, threading.Lock)  │                       │
# │                                                                             │
# │ 端口：  8889 → 8000       内存：shm_size 256mb / mem_limit 512m            │
# │ 数据：  ./data → /data（宿主机挂载持久化，必须保留）                         │
# │ 重启：  unless-stopped                                                      │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【两阶段上传流程 — 价格异常检测】                                            │
# │                                                                             │
# │  点击"上传" → Phase1: /api/upload/preview                                   │
# │     ├─ 解析 Excel（不保存到 prices.json）                                   │
# │     ├─ 逐项比对相邻历史价格                                                  │
# │     │   ├─ 偏差 ≥ 20元 → 加入 alerts 列表                                   │
# │     │   └─ 偏差 < 20元 或 无历史数据 → 自动通过                              │
# │     └─ 有 alerts → 打开 PriceReviewModal                                    │
# │                    └─ 用户可修改/还原/跳过                                  │
# │     └─ 无 alerts → 自动执行 /api/upload/confirm                             │
# │                                                                            │
# │  Phase2: /api/upload/confirm (session_id, corrections)                     │
# │    └─ 应用修正 → 合并保存到 prices.json                                    │
# │                                                                            │
# │  PriceReviewModal 弹窗列：                                                  │
# │   品牌 | 商品名 | 上期价格 | 新价格(可修改) | 差额(涨↓色) | [还原]          │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【Excel 上传格式】                                                          │
# │                                                                             │
# │  Row 1:  日期 → 统一归一化为 YYYY-MM-DD ISO 格式                           │
# │             "0621"      (MMDD)     → 2026-06-21                             │
# │             "260621"    (YYMMDD)   → 2026-06-21                             │
# │             "20260621"  (YYYYMMDD) → 2026-06-21                             │
# │             "2026-06-21" (ISO)     → 原样保留                               │
# │                                                                             │
# │  Row 2+: 品牌分区 + 商品行                                                   │
# │   品牌行: col A = 品牌名, col B = 空                                        │
# │   商品行: col A = 商品名, col B = 价格（int/float）                         │
# │   价格 = 0 或空 → 记为无报价，图表显示断点                                   │
# │                                                                             │
# │  ⚠ 品牌行识别只基于 KNOWN_BRANDS 硬编码列表，不从历史学！                   │
# │    KNOWN_BRANDS = 云南/浙江/上海/湖北/湖南/河南/河北/广西                   │
# │                    江苏/内蒙/山东/江西/贵州/四川/福建/吉林                   │
# │                    广东/安徽/陕西/重庆/甘肃/哈尔滨/公司进口                 │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【数据合并策略 — Upsert】                                                    │
# │  ① 新商品 → 追加到对应品牌末尾                                               │
# │  ② 旧商品 → 更新该日期的价格（覆盖）或新增日期                               │
# │  ③ 历史品牌本次未出现 → 完整保留                                           │
# │  ④ 历史商品本次未出现 → 保留全部历史价格数据                                 │
# │  ⑤ 同一日期多次上传 → 更新价格，不重复创建记录                              │
# │  ⑥ 线程锁 threading.Lock 防并发写入损坏                                     │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【前端 UI 交互】                                                             │
# │  技术栈：React 18 + Vite 5 + Ant Design 5 + ECharts 5 + Zustand           │
# │  图表渲染：SVG（非Canvas）— 群晖低内存适配                                   │
# │                                                                            │
# │  布局：                                                                    │
# │  ┌─────────────────────────────────────────────────────┐                   │
# │  │ 📊 价格追踪看板  [搜索栏────]   [上传] [模板下载]    │                   │
# │  ├─────────────────────────────────────────────────────┤                   │
# │  │ 云南  ┌────┐┌────┐┌────┐┌────┐┌────┐┌────┐┌────┐┌──┤  每行8列    │
# │  │       │商品││商品││商品││商品││商品││商品││商品││商 │               │
# │  │       │¥650││¥430││... ││    ││    ││    ││    ││品 │               │
# │  │       │↑12 ││↓5  ││    ││    ││    ││    ││    ││   │               │
# │  │       └────┘└────┘└────┘└────┘└────┘└────┘└────┘└───┘               │
# │  └──────────────────────────────────────────────────────────────────────┘ │
# │                                                                            │
# │  每个商品卡片 ItemCard：                                                    │
# │    · 商品名 → 点击打开详情弹窗                                              │
# │    · 迷你曲线 (ECharts SVG)：涨=红色(#ff4d4f), 跌=绿色(#52c41a), 平=灰色  │
# │    · 最新价格 + 涨跌幅 ↑N / ↓N                                             │
# │                                                                            │
# │  详情弹窗 DetailModal：                                                    │
# │    · 全历史曲线（逐段涨跌色）+ dateZoom 滑块                                 │
# │    · tooltip 显示 日期 + 价格 + 较上期涨跌                                  │
# │    · MarkLine 均价/最高/最低                                                │
# │                                                                            │
# │  搜索栏 SearchBar：前端模糊匹配，下拉 商品名—品牌                           │
# │  模板下载：含最新价格，日期=今天，用户自行修改后再上传                      │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【后端文件 — backend/app/】                                                 │
# │  main.py      FastAPI 入口，7 个路由，预览会话内存缓存                       │
# │  parser.py    Excel解析 + 日期归一化 + 异常检测(≥20元) + 两阶段合并         │
# │  storage.py   JSON 文件读写（threading.Lock）+ 旧日期格式自动迁移           │
# │  models.py    Pydantic 模型（PricePoint, SingleItem, BrandGroup...）       │
# │                                                                            │
# │  数据文件 /data/prices.json 结构：                                         │
# │  { "brands": [                                                             │
# │      { "brand": "云南", "items": [                                         │
# │          { "name": "云端之上", "prices": [                                 │
# │              { "date": "2026-06-21", "price": 1130 }                       │
# │          ] }                                                               │
# │      ] }                                                                   │
# │  ] }                                                                       │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【前端文件 — frontend/src/】                                                │
# │  App.jsx               入口：Header（上传/模板下载）+ 整合 PriceReviewModal  │
# │  SearchBar.jsx         搜索框 AutoComplete 前端模糊匹配                     │
# │  DashboardGrid.jsx     品牌 Card 列表 + 8列商品网格                         │
# │  ItemCard.jsx          商品卡片：迷你曲线+涨跌色+最新价格                    │
# │  DetailModal.jsx       详情弹窗：全历史曲线+涨跌色+dataZoom+统计            │
# │  PriceReviewModal.jsx  上传核对弹窗：异常价格列表/修改/还原/跳过            │
# │  store/priceStore.js   Zustand 状态管理：previewUpload/confirmUpload       │
# │  main.jsx              React 入口                                          │
# │                                                                            │
# │  构建: cd frontend && npm run build → dist/ → Docker 复制到 app/static     │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 【构建与部署】                                                               │
# │  Dockerfile: 单阶段（python:3.11-slim），前端预编译无 node 依赖             │
# │    COPY backend/requirements.txt .  &&  pip install                        │
# │    COPY backend/app/ ./app/                                                │
# │    COPY frontend/dist ./static                                             │
# │    CMD uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1        │
# │                                                                            │
# │  Mac 本地构建测试：                                                          │
# │    cd frontend && npm run build                                            │
# │    cp -r dist ../backend/static                                            │
# │    cd ../backend && DATA_DIR=/tmp/data uvicorn app.main:app               │
# │                                                                            │
# │  群晖部署（SSH 密码 Wm258008）：                                             │
# │    tar czf /tmp/p.tar.gz Dockerfile docker-compose.yml backend/             │
# │        frontend/dist frontend/package.json                                 │
# │        --exclude=node_modules --exclude=__pycache__ --exclude='._*'        │
# │    ssh wm8551590@192.168.1.250                                              │
# │      "cd /volume1/docker/price-tracker &&                                    │
# │       rm -rf ./* && tar xzf - -C . &&                                        │
# │       (mkdir -p data data/backups)                                            │
# │    ssh wm8551590@192.168.1.250                                              │
# │      "cd /volume1/docker/price-tracker &&                                  │
